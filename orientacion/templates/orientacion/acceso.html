{% extends 'orientacion/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <div class="text-center mb-4">
                <div class="icon-circle mx-auto">
                    <i class="fa-solid fa-user-graduate fa-xl"></i>
                </div>
                <h3 class="fw-bold mt-3">Portal Estudiantil</h3>
                <p class="text-muted">Ingresa tu documento para acceder a tu historial analítico.</p>
            </div>
            
            {% if error %}
                <div class="alert alert-danger border-0 shadow-sm rounded-3" role="alert">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i>{{ error }}
                </div>
            {% endif %}
            
            <form method="POST" action="{% url 'acceso_dashboard' %}">
                {% csrf_token %}
                <div class="form-floating mb-4">
                    <input class="form-control bg-light border-0" id="cedula" name="cedula" type="text" placeholder="17xxxxxx" required />
                    <label for="cedula"><i class="fa-regular fa-id-card me-2"></i>Cédula de Identidad</label>
                </div>
                <div class="d-grid gap-3 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">
                        Ingresar al Dashboard <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>
                    <a href="{% url 'registro' %}" class="btn btn-light fw-semibold text-secondary">
                        <i class="fa-solid fa-user-plus me-2"></i>Crear nuevo perfil
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
