{% extends 'orientacion/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-lg">
            <div class="card-header bg-dark text-white text-center">
                <h4 class="my-2">Acceso al Dashboard</h4>
            </div>
            <div class="card-body p-4">
                {% if error %}
                    <div class="alert alert-danger" role="alert">
                        {{ error }}
                    </div>
                {% endif %}
                <form method="POST" action="{% url 'acceso_dashboard' %}">
                    {% csrf_token %}
                    <div class="form-floating mb-3">
                        <input class="form-control" id="cedula" name="cedula" type="text" placeholder="17xxxxxx" required />
                        <label for="cedula">Cédula de Identidad</label>
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Ingresar</button>
                        <a href="{% url 'registro' %}" class="btn btn-outline-secondary">No tengo cuenta, registrarme</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
